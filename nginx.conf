server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Tenta arquivo estático, se não existir cai para index.html (SPA)
    location / {
        try_files $uri /index.html;
    }

    # Arquivos estáticos
    location /assets/ {
        try_files $uri =404;
    }
}